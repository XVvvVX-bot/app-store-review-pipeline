name: App Store AppTweak Compare

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum active targets to compare"
        required: false
        default: "10"
        type: string
      provider_page_limit:
        description: "Maximum AppTweak pages per app-country scope"
        required: false
        default: "2"
        type: string
      provider_request_limit:
        description: "AppTweak reviews per request"
        required: false
        default: "500"
        type: string
      provider_request_delay_seconds:
        description: "Delay between AppTweak requests"
        required: false
        default: "1"
        type: string
      rss_request_delay_seconds:
        description: "Delay between RSS requests"
        required: false
        default: "0.5"
        type: string

permissions:
  contents: read

concurrency:
  group: app-store-apptweak-compare
  cancel-in-progress: false

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      INPUT_LIMIT: ${{ inputs.limit || '10' }}
      INPUT_PROVIDER_PAGE_LIMIT: ${{ inputs.provider_page_limit || '2' }}
      INPUT_PROVIDER_REQUEST_LIMIT: ${{ inputs.provider_request_limit || '500' }}
      INPUT_PROVIDER_REQUEST_DELAY_SECONDS: ${{ inputs.provider_request_delay_seconds || '1' }}
      INPUT_RSS_REQUEST_DELAY_SECONDS: ${{ inputs.rss_request_delay_seconds || '0.5' }}
      APP_STORE_APPTWEAK_TOKEN: ${{ secrets.APP_STORE_APPTWEAK_TOKEN }}

    steps:
      - name: Check AppTweak token
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_APPTWEAK_TOKEN:-}" ]; then
            echo "APP_STORE_APPTWEAK_TOKEN secret is not configured."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Compare RSS and AppTweak reviews
        run: |
          set -euo pipefail
          python app_store_pipeline.py compare-apptweak \
            --limit "$INPUT_LIMIT" \
            --provider-page-limit "$INPUT_PROVIDER_PAGE_LIMIT" \
            --provider-request-limit "$INPUT_PROVIDER_REQUEST_LIMIT" \
            --provider-request-delay-seconds "$INPUT_PROVIDER_REQUEST_DELAY_SECONDS" \
            --rss-request-delay-seconds "$INPUT_RSS_REQUEST_DELAY_SECONDS"

      - name: Upload AppTweak comparison artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: app-store-apptweak-compare-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          path: |
            data/reports/provider_compare/
            data/raw/provider_compare/
