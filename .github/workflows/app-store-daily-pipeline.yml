name: App Store Review Pipeline

on:
  # GitHub cron is UTC. These map to 20:07 and 08:07 America/Los_Angeles during PDT.
  schedule:
    - cron: "7 3,15 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum active targets to ingest"
        required: false
        default: "0"
        type: string
      target_offset:
        description: "Number of active targets to skip before applying limit; auto is treated as 0 for full-scope daily matrix"
        required: false
        default: "0"
        type: string
      experiment_group:
        description: "Optional operating-model experiment group from docs/experiments/operating_model_target_groups.json"
        required: false
        default: ""
        type: string
      max_parallel:
        description: "Maximum app-level daily jobs to run in parallel. True parallelism requires multiple self-hosted runner instances."
        required: false
        default: "4"
        type: string
      max_pages_per_app_country:
        description: "Maximum web catalog pages per app-country scope; 0 means fetch until overlap/no-next/time budget"
        required: false
        default: "0"
        type: string
      pressure_ramp_mode:
        description: "Use stored safe web catalog pressure, candidate pressure, or keep the fixed page cap"
        required: false
        default: "fixed"
        type: choice
        options:
          - fixed
          - safe
          - candidate
      pressure_ramp_lookback_minutes:
        description: "Recent clean-history window used by auto pressure ramp"
        required: false
        default: "720"
        type: string
      pressure_ramp_max_pages:
        description: "Highest page cap auto pressure ramp may select"
        required: false
        default: "25"
        type: string
      start_page:
        description: "First web catalog page to fetch"
        required: false
        default: "1"
        type: string
      review_limit:
        description: "Requested web catalog reviews per page; Apple currently caps this at 20"
        required: false
        default: "20"
        type: string
      request_delay_seconds:
        description: "Delay between web catalog requests"
        required: false
        default: "10"
        type: string
      request_delay_jitter_seconds:
        description: "Positive random jitter added to each normal request delay"
        required: false
        default: "5"
        type: string
      web_429_retries:
        description: "Retries after HTTP 429"
        required: false
        default: "2"
        type: string
      web_429_retry_seconds:
        description: "Base delay before retrying HTTP 429"
        required: false
        default: "300"
        type: string
      web_429_backoff_multiplier:
        description: "Multiplier applied to HTTP 429 retry delay on each additional retry"
        required: false
        default: "1.5"
        type: string
      web_429_retry_jitter_seconds:
        description: "Positive random jitter added to each HTTP 429 retry delay"
        required: false
        default: "60"
        type: string
      web_time_budget_seconds:
        description: "Wall-clock budget for web catalog fetching; 0 means no budget"
        required: false
        default: "3600"
        type: string
      web_scope_time_budget_seconds:
        description: "Optional per app-country budget for web catalog fetching; 0 means no per-scope budget"
        required: false
        default: "3600"
        type: string
      disable_overlap_stop:
        description: "Fetch to page cap/no-next even after already-known web catalog review IDs are seen"
        required: false
        default: false
        type: boolean
      web_429_circuit_breaker_lookback_minutes:
        description: "Skip/fail when recent web catalog pages show too many HTTP 429s"
        required: false
        default: "720"
        type: string
      web_429_cooldown_minutes:
        description: "Optional pre-run fail-fast cooldown after recent HTTP 429; 0 disables pre-run cooldown"
        required: false
        default: "0"
        type: string
      web_429_circuit_breaker_min_pages:
        description: "Minimum pages before a 429 circuit breaker can trip"
        required: false
        default: "4"
        type: string
      web_429_circuit_breaker_max_rate:
        description: "Fail when HTTP 429 page rate is at or above this value"
        required: false
        default: "0.5"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: app-store-postgres-writer
  cancel-in-progress: false

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      max_parallel: ${{ steps.build-matrix.outputs.max_parallel }}
      run_started_at: ${{ steps.build-matrix.outputs.run_started_at }}
      selected_count: ${{ steps.build-matrix.outputs.selected_count }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build app daily matrix
        id: build-matrix
        env:
          INPUT_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '0' }}
          INPUT_TARGET_OFFSET: ${{ github.event_name == 'workflow_dispatch' && inputs.target_offset || '0' }}
          INPUT_EXPERIMENT_GROUP: ${{ github.event_name == 'workflow_dispatch' && inputs.experiment_group || '' }}
          INPUT_MAX_PARALLEL: ${{ github.event_name == 'workflow_dispatch' && inputs.max_parallel || '4' }}
        run: |
          set -euo pipefail
          echo "run_started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          from app_store_review_pipeline.experiment_groups import build_daily_matrix_rows

          limit = max(0, int(os.environ["INPUT_LIMIT"]))
          offset_raw = os.environ["INPUT_TARGET_OFFSET"].strip().lower()
          start_offset = 0 if offset_raw == "auto" else max(0, int(offset_raw))
          experiment_group = os.environ["INPUT_EXPERIMENT_GROUP"].strip()
          max_parallel = max(1, int(os.environ["INPUT_MAX_PARALLEL"]))
          rows = build_daily_matrix_rows(
              Path("data/targets/apple_apps.csv"),
              limit=limit,
              target_offset=start_offset,
              experiment_group=experiment_group,
          )
          matrix = {"include": rows}
          print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
          print(f"selected_count={len(rows)}")
          print(f"max_parallel={max_parallel}")
          PY

      - name: Send external schedule heartbeat
        if: ${{ github.event_name == 'schedule' }}
        continue-on-error: true
        env:
          APP_STORE_HEARTBEAT_URL: ${{ secrets.APP_STORE_HEARTBEAT_URL }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_HEARTBEAT_URL:-}" ]; then
            echo "::notice title=external_heartbeat_not_configured::APP_STORE_HEARTBEAT_URL is not configured; missing-run detection is external and currently inactive."
            exit 0
          fi
          curl --fail --silent --show-error \
            --max-time 20 \
            --retry 2 \
            --retry-all-errors \
            "$APP_STORE_HEARTBEAT_URL" \
            >/dev/null

  preflight:
    needs: prepare-matrix
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    env:
      PIP_CONFIG_FILE: /dev/null
      PIP_USER: "false"
      INPUT_WEB_429_CIRCUIT_BREAKER_LOOKBACK_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_circuit_breaker_lookback_minutes || '720' }}
      INPUT_WEB_429_COOLDOWN_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_cooldown_minutes || '0' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_MIN_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_circuit_breaker_min_pages || '4' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_circuit_breaker_max_rate || '0.5' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create Python virtualenv
        run: |
          set -euo pipefail
          python3.12 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip

      - name: Install dependencies
        run: .venv/bin/python -m pip install -r requirements.txt

      - name: Check local Postgres
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py init-postgres --database-url "$database_url"

      - name: Sync targets to Postgres
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py sync-targets \
            --database-url "$database_url"

      - name: Check web catalog 429 cooldown
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py check-web-429-cooldown \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --cooldown-minutes "$INPUT_WEB_429_COOLDOWN_MINUTES"

      - name: Check recent web catalog 429 circuit breaker
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py check-web-429-circuit-breaker \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --lookback-minutes "$INPUT_WEB_429_CIRCUIT_BREAKER_LOOKBACK_MINUTES" \
            --min-pages "$INPUT_WEB_429_CIRCUIT_BREAKER_MIN_PAGES" \
            --max-rate "$INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE"

      - name: Run tests
        run: .venv/bin/python -m pytest -q

  daily:
    needs:
      - prepare-matrix
      - preflight
    if: ${{ fromJSON(needs.prepare-matrix.outputs.selected_count) > 0 }}
    name: daily ${{ matrix.target_offset }} ${{ matrix.app_name }}
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.prepare-matrix.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    env:
      PIP_CONFIG_FILE: /dev/null
      PIP_USER: "false"
      INPUT_LIMIT: "1"
      INPUT_TARGET_OFFSET: ${{ matrix.target_offset }}
      MATRIX_APP_ID: ${{ matrix.app_id }}
      INPUT_MAX_PAGES_PER_APP_COUNTRY: ${{ github.event_name == 'workflow_dispatch' && inputs.max_pages_per_app_country || '0' }}
      INPUT_PRESSURE_RAMP_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.pressure_ramp_mode || 'fixed' }}
      INPUT_PRESSURE_RAMP_LOOKBACK_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.pressure_ramp_lookback_minutes || '720' }}
      INPUT_PRESSURE_RAMP_MAX_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.pressure_ramp_max_pages || '25' }}
      INPUT_START_PAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.start_page || '1' }}
      INPUT_REVIEW_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.review_limit || '20' }}
      INPUT_REQUEST_DELAY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.request_delay_seconds || '10' }}
      INPUT_REQUEST_DELAY_JITTER_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.request_delay_jitter_seconds || '5' }}
      INPUT_WEB_429_RETRIES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retries || '2' }}
      INPUT_WEB_429_RETRY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retry_seconds || '300' }}
      INPUT_WEB_429_BACKOFF_MULTIPLIER: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_backoff_multiplier || '1.5' }}
      INPUT_WEB_429_RETRY_JITTER_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retry_jitter_seconds || '60' }}
      INPUT_WEB_TIME_BUDGET_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_time_budget_seconds || '3600' }}
      INPUT_WEB_SCOPE_TIME_BUDGET_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_scope_time_budget_seconds || '3600' }}
      INPUT_DISABLE_OVERLAP_STOP: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_overlap_stop || 'false' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_MIN_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_circuit_breaker_min_pages || '4' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_circuit_breaker_max_rate || '0.5' }}
      DAILY_RUN_STARTED_AT: ${{ needs.prepare-matrix.outputs.run_started_at }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create Python virtualenv
        run: |
          set -euo pipefail
          python3.12 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip

      - name: Install dependencies
        run: .venv/bin/python -m pip install -r requirements.txt

      - name: Check local Postgres connection
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          DATABASE_URL="$database_url" .venv/bin/python - <<'PY'
          import os

          import psycopg

          with psycopg.connect(os.environ["DATABASE_URL"]) as connection:
              connection.execute("SELECT 1").fetchone()
          PY

      - name: Select web catalog pressure
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          selected_max_pages_per_app_country="$INPUT_MAX_PAGES_PER_APP_COUNTRY"
          if [[ "$INPUT_PRESSURE_RAMP_MODE" == "safe" || "$INPUT_PRESSURE_RAMP_MODE" == "candidate" ]]; then
            pressure_json="$(.venv/bin/python app_store_pipeline.py select-web-catalog-pressure \
              --database-url "$database_url" \
              --source apple_app_store_web_catalog_reviews \
              --lookback-minutes "$INPUT_PRESSURE_RAMP_LOOKBACK_MINUTES" \
              --base-pages "$INPUT_MAX_PAGES_PER_APP_COUNTRY" \
              --max-pages "$INPUT_PRESSURE_RAMP_MAX_PAGES" \
              --selection-mode "$INPUT_PRESSURE_RAMP_MODE")"
            echo "$pressure_json"
            selected_max_pages_per_app_country="$(
              PRESSURE_JSON="$pressure_json" .venv/bin/python - <<'PY'
          import json
          import os

          print(json.loads(os.environ["PRESSURE_JSON"])["selected_max_pages_per_app_country"])
          PY
            )"
          fi
          echo "SELECTED_MAX_PAGES_PER_APP_COUNTRY=$selected_max_pages_per_app_country" >> "$GITHUB_ENV"
          echo "Using max pages per app-country: $selected_max_pages_per_app_country"

      - name: Run primary web catalog review pipeline
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          max_pages_per_app_country="$SELECTED_MAX_PAGES_PER_APP_COUNTRY"
          echo "Using max pages per app-country: $max_pages_per_app_country"
          echo "Daily incremental app offset $INPUT_TARGET_OFFSET: ${{ matrix.app_name }} ($MATRIX_APP_ID)"

          overlap_flag=""
          if [ "$INPUT_DISABLE_OVERLAP_STOP" = "true" ]; then
            overlap_flag="--disable-overlap-stop"
          fi
          .venv/bin/python app_store_pipeline.py daily-web-catalog \
            --database-url "$database_url" \
            --limit "$INPUT_LIMIT" \
            --target-offset "$INPUT_TARGET_OFFSET" \
            --max-pages-per-app-country "$max_pages_per_app_country" \
            --start-page "$INPUT_START_PAGE" \
            --review-limit "$INPUT_REVIEW_LIMIT" \
            --request-delay-seconds "$INPUT_REQUEST_DELAY_SECONDS" \
            --request-delay-jitter-seconds "$INPUT_REQUEST_DELAY_JITTER_SECONDS" \
            --web-429-retries "$INPUT_WEB_429_RETRIES" \
            --web-429-retry-seconds "$INPUT_WEB_429_RETRY_SECONDS" \
            --web-429-backoff-multiplier "$INPUT_WEB_429_BACKOFF_MULTIPLIER" \
            --web-429-retry-jitter-seconds "$INPUT_WEB_429_RETRY_JITTER_SECONDS" \
            --web-time-budget-seconds "$INPUT_WEB_TIME_BUDGET_SECONDS" \
            --web-scope-time-budget-seconds "$INPUT_WEB_SCOPE_TIME_BUDGET_SECONDS" \
            --assume-postgres-schema \
            --skip-target-sync \
            $overlap_flag

      - name: Check current-run web catalog 429 circuit breaker
        if: ${{ always() && !cancelled() }}
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py check-web-429-circuit-breaker \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --since "$DAILY_RUN_STARTED_AT" \
            --min-pages 1 \
            --max-rate "$INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE"

      - name: Record web catalog pressure result
        if: ${{ always() && !cancelled() && env.INPUT_PRESSURE_RAMP_MODE == 'candidate' }}
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          used_pages="${SELECTED_MAX_PAGES_PER_APP_COUNTRY:-$INPUT_MAX_PAGES_PER_APP_COUNTRY}"
          .venv/bin/python app_store_pipeline.py record-web-catalog-pressure-result \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --since "$DAILY_RUN_STARTED_AT" \
            --used-pages "$used_pages" \
            --base-pages "$INPUT_MAX_PAGES_PER_APP_COUNTRY" \
            --max-pages "$INPUT_PRESSURE_RAMP_MAX_PAGES"

      - name: Upload App Store daily artifacts
        if: ${{ always() && !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: app-store-review-pipeline-${{ github.run_id }}-${{ matrix.target_offset }}-${{ matrix.app_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            data/raw/apple_web_catalog/
            data/reports/apple_web_catalog/

  monitor:
    needs:
      - prepare-matrix
      - preflight
      - daily
    if: ${{ always() && !cancelled() }}
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    env:
      PIP_CONFIG_FILE: /dev/null
      PIP_USER: "false"
      DAILY_RUN_STARTED_AT: ${{ needs.prepare-matrix.outputs.run_started_at }}
      SELECTED_COUNT: ${{ needs.prepare-matrix.outputs.selected_count }}
      PREPARE_RESULT: ${{ needs.prepare-matrix.result }}
      PREFLIGHT_RESULT: ${{ needs.preflight.result }}
      DAILY_RESULT: ${{ needs.daily.result }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create Python virtualenv
        run: |
          set -euo pipefail
          python3.12 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip

      - name: Install dependencies
        run: .venv/bin/python -m pip install -r requirements.txt

      - name: Fetch GitHub workflow metadata
        run: |
          set -euo pipefail
          mkdir -p data/reports/monitoring
          .venv/bin/python - <<'PY'
          import json
          import os
          import subprocess
          import time
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]

          def run_gh_api(endpoint):
              last_error = None
              for attempt in range(1, 4):
                  try:
                      return subprocess.run(
                          ["gh", "api", endpoint],
                          check=True,
                          capture_output=True,
                          text=True,
                      )
                  except subprocess.CalledProcessError as exc:
                      last_error = exc
                      if attempt < 3:
                          time.sleep(attempt * 3)
              raise last_error

          def fetch_jobs(target_run_id):
              jobs = []
              page = 1
              while True:
                  result = run_gh_api(
                      f"repos/{repo}/actions/runs/{target_run_id}/jobs?per_page=100&page={page}"
                  )
                  payload = json.loads(result.stdout)
                  batch = payload.get("jobs") or []
                  jobs.extend(batch)
                  if len(batch) < 100:
                      break
                  page += 1
              return jobs

          jobs = fetch_jobs(run_id)
          runs_result = run_gh_api(
              f"repos/{repo}/actions/workflows/app-store-daily-pipeline.yml/runs?per_page=20"
          )
          runs_payload = json.loads(runs_result.stdout)
          enriched = 0
          for run in runs_payload.get("workflow_runs") or []:
              if run.get("event") != "schedule" or run.get("status") != "completed":
                  continue
              if enriched >= 4:
                  break
              historical_jobs = fetch_jobs(run["id"])
              required_jobs = [
                  job
                  for job in historical_jobs
                  if str(job.get("name") or "").strip().lower() != "monitor"
                  and not str(job.get("name") or "").strip().lower().startswith("monitor ")
              ]
              failed = any(
                  str(job.get("conclusion") or "").lower() in {"failure", "cancelled", "timed_out"}
                  for job in required_jobs
              )
              run["required_job_failure_count"] = sum(
                  str(job.get("conclusion") or "").lower() in {"failure", "cancelled", "timed_out"}
                  for job in required_jobs
              )
              run["ingestion_conclusion"] = "failure" if failed else "success"
              enriched += 1

          output = Path("data/reports/monitoring")
          (output / "github_jobs.json").write_text(json.dumps({"jobs": jobs}, indent=2), encoding="utf-8")
          (output / "github_runs.json").write_text(json.dumps(runs_payload, indent=2), encoding="utf-8")
          PY

      - name: Generate monitoring report
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          run_started_at="${DAILY_RUN_STARTED_AT:-}"
          if [ -z "$run_started_at" ]; then
            run_started_at="$(.venv/bin/python - <<'PY'
          from datetime import datetime, timedelta, timezone

          print((datetime.now(timezone.utc) - timedelta(hours=3)).replace(microsecond=0).isoformat().replace("+00:00", "Z"))
          PY
            )"
          fi
          selected_count="${SELECTED_COUNT:-0}"
          workflow_result="success"
          for result in "$PREPARE_RESULT" "$PREFLIGHT_RESULT" "$DAILY_RESULT"; do
            case "$result" in
              success|skipped) ;;
              *) workflow_result="failure" ;;
            esac
          done
          if [ "$selected_count" != "0" ] && [ "$DAILY_RESULT" != "success" ]; then
            workflow_result="failure"
          fi
          set +e
          .venv/bin/python app_store_pipeline.py monitoring-report \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --since "$run_started_at" \
            --selected-count "$selected_count" \
            --workflow-result "$workflow_result" \
            --github-run-id "$GITHUB_RUN_ID" \
            --github-run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --github-event-name "$GITHUB_EVENT_NAME" \
            --github-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --github-jobs-json data/reports/monitoring/github_jobs.json \
            --github-runs-json data/reports/monitoring/github_runs.json \
            --markdown-output data/reports/monitoring/current_run_health.md \
            --json-output data/reports/monitoring/current_run_health.json \
            --fail-on failing
          report_code=$?
          set -e
          cat data/reports/monitoring/current_run_health.md >> "$GITHUB_STEP_SUMMARY"
          exit "$report_code"

      - name: Send failing monitoring email
        if: ${{ always() && !cancelled() }}
        env:
          APP_STORE_ALERT_SMTP_HOST: ${{ vars.APP_STORE_ALERT_SMTP_HOST }}
          APP_STORE_ALERT_SMTP_PORT: ${{ vars.APP_STORE_ALERT_SMTP_PORT }}
          APP_STORE_ALERT_SMTP_USERNAME: ${{ secrets.APP_STORE_ALERT_SMTP_USERNAME }}
          APP_STORE_ALERT_SMTP_APP_PASSWORD: ${{ secrets.APP_STORE_ALERT_SMTP_APP_PASSWORD }}
          APP_STORE_ALERT_EMAIL_FROM: ${{ secrets.APP_STORE_ALERT_EMAIL_FROM }}
          APP_STORE_ALERT_EMAIL_TO: ${{ secrets.APP_STORE_ALERT_EMAIL_TO }}
        run: |
          set -euo pipefail
          if [ ! -f data/reports/monitoring/current_run_health.json ]; then
            echo "::warning title=monitoring_email_skipped::Monitoring JSON was not generated."
            exit 0
          fi
          .venv/bin/python app_store_pipeline.py send-monitoring-email \
            --report-json data/reports/monitoring/current_run_health.json \
            --result-json data/reports/monitoring/notification_result.json

      - name: Upload monitoring report
        if: ${{ always() && !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: app-store-monitoring-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            data/reports/monitoring/current_run_health.md
            data/reports/monitoring/current_run_health.json
            data/reports/monitoring/github_jobs.json
            data/reports/monitoring/github_runs.json
            data/reports/monitoring/notification_result.json
