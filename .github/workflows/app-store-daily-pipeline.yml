name: App Store Review Pipeline

on:
  schedule:
    # Cooldown-safe web catalog probe while the safe public-source rate is being measured.
    - cron: "30 6,18 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum active targets to ingest"
        required: false
        default: "1"
        type: string
      target_offset:
        description: "Number of active targets to skip before applying limit, or auto for coverage-aware rotation"
        required: false
        default: "auto"
        type: string
      max_pages_per_app_country:
        description: "Maximum web catalog pages per app-country scope; use 0 only for manual complete-backfill probes"
        required: false
        default: "5"
        type: string
      start_page:
        description: "First web catalog page to fetch"
        required: false
        default: "1"
        type: string
      review_limit:
        description: "Requested web catalog reviews per page; Apple currently caps this at 20"
        required: false
        default: "20"
        type: string
      request_delay_seconds:
        description: "Delay between web catalog requests"
        required: false
        default: "10"
        type: string
      web_429_retries:
        description: "Retries after HTTP 429"
        required: false
        default: "2"
        type: string
      web_429_retry_seconds:
        description: "Delay before retrying HTTP 429"
        required: false
        default: "60"
        type: string
      web_429_backoff_multiplier:
        description: "Multiplier applied to HTTP 429 retry delay on each additional retry"
        required: false
        default: "1.5"
        type: string
      web_time_budget_seconds:
        description: "Wall-clock budget for web catalog fetching; 0 means no budget"
        required: false
        default: "1200"
        type: string
      web_scope_time_budget_seconds:
        description: "Optional per app-country budget for web catalog fetching; 0 means no per-scope budget"
        required: false
        default: "0"
        type: string
      disable_overlap_stop:
        description: "Fetch to page cap/no-next even after already-known web catalog review IDs are seen"
        required: false
        default: false
        type: boolean
      stop_at_rss_parity:
        description: "Migration mode: continue until web catalog reaches current RSS count, then stop"
        required: false
        default: false
        type: boolean
      web_429_circuit_breaker_lookback_minutes:
        description: "Skip/fail when recent web catalog pages show too many HTTP 429s"
        required: false
        default: "720"
        type: string
      web_429_circuit_breaker_min_pages:
        description: "Minimum pages before a 429 circuit breaker can trip"
        required: false
        default: "4"
        type: string
      web_429_circuit_breaker_max_rate:
        description: "Fail when HTTP 429 page rate is at or above this value"
        required: false
        default: "0.5"
        type: string

permissions:
  contents: read

concurrency:
  group: app-store-postgres-writer
  cancel-in-progress: false

jobs:
  daily:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 120
    env:
      PIP_CONFIG_FILE: /dev/null
      PIP_USER: "false"
      INPUT_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '1' }}
      INPUT_TARGET_OFFSET: ${{ github.event_name == 'workflow_dispatch' && inputs.target_offset || 'auto' }}
      INPUT_MAX_PAGES_PER_APP_COUNTRY: ${{ github.event_name == 'workflow_dispatch' && inputs.max_pages_per_app_country || '5' }}
      INPUT_START_PAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.start_page || '1' }}
      INPUT_REVIEW_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.review_limit || '20' }}
      INPUT_REQUEST_DELAY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.request_delay_seconds || '10' }}
      INPUT_WEB_429_RETRIES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retries || '2' }}
      INPUT_WEB_429_RETRY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retry_seconds || '60' }}
      INPUT_WEB_429_BACKOFF_MULTIPLIER: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_backoff_multiplier || '1.5' }}
      INPUT_WEB_TIME_BUDGET_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_time_budget_seconds || '1200' }}
      INPUT_WEB_SCOPE_TIME_BUDGET_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_scope_time_budget_seconds || '0' }}
      INPUT_DISABLE_OVERLAP_STOP: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_overlap_stop || 'false' }}
      INPUT_STOP_AT_RSS_PARITY: ${{ github.event_name == 'workflow_dispatch' && inputs.stop_at_rss_parity || 'false' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_LOOKBACK_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_circuit_breaker_lookback_minutes || '720' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_MIN_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_circuit_breaker_min_pages || '4' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_circuit_breaker_max_rate || '0.5' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Mark run window
        id: run-window
        run: echo "run_started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Create Python virtualenv
        run: |
          set -euo pipefail
          python3.12 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip

      - name: Install dependencies
        run: .venv/bin/python -m pip install -r requirements.txt

      - name: Check local Postgres
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py init-postgres --database-url "$database_url"

      - name: Check recent web catalog 429 circuit breaker
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py check-web-429-circuit-breaker \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --lookback-minutes "$INPUT_WEB_429_CIRCUIT_BREAKER_LOOKBACK_MINUTES" \
            --min-pages "$INPUT_WEB_429_CIRCUIT_BREAKER_MIN_PAGES" \
            --max-rate "$INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE"

      - name: Run tests
        run: .venv/bin/python -m pytest -q

      - name: Run primary web catalog review pipeline
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          target_offset="$INPUT_TARGET_OFFSET"
          if [[ "$target_offset" == "auto" ]]; then
            target_offset="$(.venv/bin/python scripts/summarize_source_coverage.py \
              --database-url "$database_url" \
              --targets data/targets/apple_apps.csv \
              --max-pages-per-app-country "$INPUT_MAX_PAGES_PER_APP_COUNTRY" \
              --review-limit "$INPUT_REVIEW_LIMIT" \
              --print-next-target-offset)"
          fi
          echo "Using target offset: $target_offset"

          overlap_flag=""
          if [ "$INPUT_DISABLE_OVERLAP_STOP" = "true" ]; then
            overlap_flag="--disable-overlap-stop"
          fi
          parity_flag=""
          if [ "$INPUT_STOP_AT_RSS_PARITY" = "true" ]; then
            parity_flag="--stop-at-rss-parity"
          fi

          .venv/bin/python app_store_pipeline.py daily-web-catalog \
            --database-url "$database_url" \
            --limit "$INPUT_LIMIT" \
            --target-offset "$target_offset" \
            --max-pages-per-app-country "$INPUT_MAX_PAGES_PER_APP_COUNTRY" \
            --start-page "$INPUT_START_PAGE" \
            --review-limit "$INPUT_REVIEW_LIMIT" \
            --request-delay-seconds "$INPUT_REQUEST_DELAY_SECONDS" \
            --web-429-retries "$INPUT_WEB_429_RETRIES" \
            --web-429-retry-seconds "$INPUT_WEB_429_RETRY_SECONDS" \
            --web-429-backoff-multiplier "$INPUT_WEB_429_BACKOFF_MULTIPLIER" \
            --web-time-budget-seconds "$INPUT_WEB_TIME_BUDGET_SECONDS" \
            --web-scope-time-budget-seconds "$INPUT_WEB_SCOPE_TIME_BUDGET_SECONDS" \
            $parity_flag \
            $overlap_flag

      - name: Check current-run web catalog 429 circuit breaker
        if: ${{ always() && !cancelled() }}
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py check-web-429-circuit-breaker \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --since "${{ steps.run-window.outputs.run_started_at }}" \
            --min-pages 1 \
            --max-rate "$INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE"

      - name: Upload App Store daily artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: app-store-review-pipeline-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            data/raw/apple_web_catalog/
            data/reports/apple_web_catalog/
