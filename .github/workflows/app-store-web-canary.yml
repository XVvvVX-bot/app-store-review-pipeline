name: App Store Web Catalog Canary

on:
  schedule:
    # Bounded canary for the candidate web catalog recent-review path.
    - cron: "30 */6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum active targets to probe"
        required: false
        default: "20"
        type: string
      max_web_pages:
        description: "Maximum web catalog review pages per app-country scope"
        required: false
        default: "2"
        type: string
      request_delay_seconds:
        description: "Delay between web catalog requests"
        required: false
        default: "2"
        type: string
      rss_request_delay_seconds:
        description: "Delay between RSS requests"
        required: false
        default: "0.5"
        type: string
      web_429_retries:
        description: "Retries after HTTP 429"
        required: false
        default: "3"
        type: string
      web_429_retry_seconds:
        description: "Delay before retrying HTTP 429"
        required: false
        default: "45"
        type: string

permissions:
  contents: read

concurrency:
  group: app-store-web-catalog-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      INPUT_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '20' }}
      INPUT_MAX_WEB_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_web_pages || '2' }}
      INPUT_REQUEST_DELAY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.request_delay_seconds || '2' }}
      INPUT_RSS_REQUEST_DELAY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.rss_request_delay_seconds || '0.5' }}
      INPUT_WEB_429_RETRIES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retries || '3' }}
      INPUT_WEB_429_RETRY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retry_seconds || '45' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Compare RSS and App Store web catalog reviews
        run: |
          set -euo pipefail
          python app_store_pipeline.py compare-sources \
            --limit "$INPUT_LIMIT" \
            --web-max-pages "$INPUT_MAX_WEB_PAGES" \
            --web-request-delay-seconds "$INPUT_REQUEST_DELAY_SECONDS" \
            --web-429-retries "$INPUT_WEB_429_RETRIES" \
            --web-429-retry-seconds "$INPUT_WEB_429_RETRY_SECONDS" \
            --rss-request-delay-seconds "$INPUT_RSS_REQUEST_DELAY_SECONDS"

      - name: Upload source comparison canary artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: app-store-web-catalog-canary-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          path: |
            data/reports/source_compare/
            data/raw/source_compare/
