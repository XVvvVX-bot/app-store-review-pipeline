name: App Store Web Catalog Canary

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum active targets to probe"
        required: false
        default: "5"
        type: string
      target_offset:
        description: "Number of active targets to skip before applying limit, or auto for scheduled-style rotation"
        required: false
        default: "0"
        type: string
      max_web_pages:
        description: "Maximum web catalog review pages per app-country scope"
        required: false
        default: "25"
        type: string
      web_review_limit:
        description: "Requested web catalog reviews per page; Apple currently caps this at 20"
        required: false
        default: "20"
        type: string
      request_delay_seconds:
        description: "Delay between web catalog requests"
        required: false
        default: "1"
        type: string
      rss_request_delay_seconds:
        description: "Delay between RSS requests"
        required: false
        default: "0.1"
        type: string
      web_429_retries:
        description: "Retries after HTTP 429"
        required: false
        default: "5"
        type: string
      web_429_retry_seconds:
        description: "Delay before retrying HTTP 429"
        required: false
        default: "20"
        type: string
      web_429_backoff_multiplier:
        description: "Multiplier applied to HTTP 429 retry delay on each additional retry"
        required: false
        default: "1.5"
        type: string
      web_skip_html:
        description: "Skip the extra HTML page probe and compare only RSS vs web catalog JSON"
        required: false
        default: "true"
        type: string
      web_stop_at_rss_parity:
        description: "Stop each web catalog scope after matching that scope's RSS review count"
        required: false
        default: "true"
        type: string
      web_time_budget_seconds:
        description: "Maximum seconds to spend on the web catalog comparison path; 0 disables the budget"
        required: false
        default: "900"
        type: string

permissions:
  contents: read

concurrency:
  group: app-store-web-catalog-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      INPUT_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '1' }}
      INPUT_TARGET_OFFSET: ${{ github.event_name == 'workflow_dispatch' && inputs.target_offset || 'auto' }}
      INPUT_MAX_WEB_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_web_pages || '25' }}
      INPUT_WEB_REVIEW_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.web_review_limit || '20' }}
      INPUT_REQUEST_DELAY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.request_delay_seconds || '5' }}
      INPUT_RSS_REQUEST_DELAY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.rss_request_delay_seconds || '0.1' }}
      INPUT_WEB_429_RETRIES: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retries || '5' }}
      INPUT_WEB_429_RETRY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_retry_seconds || '60' }}
      INPUT_WEB_429_BACKOFF_MULTIPLIER: ${{ github.event_name == 'workflow_dispatch' && inputs.web_429_backoff_multiplier || '1.5' }}
      INPUT_WEB_SKIP_HTML: ${{ github.event_name == 'workflow_dispatch' && inputs.web_skip_html || 'true' }}
      INPUT_WEB_STOP_AT_RSS_PARITY: ${{ github.event_name == 'workflow_dispatch' && inputs.web_stop_at_rss_parity || 'true' }}
      INPUT_WEB_TIME_BUDGET_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.web_time_budget_seconds || '1200' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Compare RSS and App Store web catalog reviews
        run: |
          set -euo pipefail
          target_offset="$INPUT_TARGET_OFFSET"
          if [[ "$target_offset" == "auto" ]]; then
            target_offset="$(python - <<'PY'
          import csv
          import os
          import time

          limit = max(1, int(os.environ.get("INPUT_LIMIT", "1") or "1"))
          with open("data/targets/apple_apps.csv", newline="", encoding="utf-8") as handle:
              active_count = sum(
                  1
                  for row in csv.DictReader(handle)
                  if str(row.get("active", "")).strip().lower() in {"1", "true", "yes", "y"}
              )
          if active_count <= 0:
              print(0)
          else:
              slot = int(time.time() // (6 * 60 * 60))
              print((slot * limit) % active_count)
          PY
          )"
          fi
          echo "Using target offset: $target_offset"
          args=(
            compare-sources
            --limit "$INPUT_LIMIT"
            --target-offset "$target_offset"
            --web-max-pages "$INPUT_MAX_WEB_PAGES"
            --web-review-limit "$INPUT_WEB_REVIEW_LIMIT"
            --web-request-delay-seconds "$INPUT_REQUEST_DELAY_SECONDS"
            --web-429-retries "$INPUT_WEB_429_RETRIES"
            --web-429-retry-seconds "$INPUT_WEB_429_RETRY_SECONDS"
            --web-429-backoff-multiplier "$INPUT_WEB_429_BACKOFF_MULTIPLIER"
            --web-time-budget-seconds "$INPUT_WEB_TIME_BUDGET_SECONDS"
            --rss-request-delay-seconds "$INPUT_RSS_REQUEST_DELAY_SECONDS"
          )
          if [[ "$INPUT_WEB_SKIP_HTML" == "true" ]]; then
            args+=(--web-skip-html)
          fi
          if [[ "$INPUT_WEB_STOP_AT_RSS_PARITY" == "true" ]]; then
            args+=(--web-stop-at-rss-parity)
          fi
          python app_store_pipeline.py "${args[@]}"

      - name: Upload source comparison canary artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: app-store-web-catalog-canary-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          path: |
            data/reports/source_compare/
            data/raw/source_compare/
