name: App Store Web Catalog Backfill

on:
  workflow_dispatch:
    inputs:
      confirm_backfill:
        description: "Type I_UNDERSTAND_BACKFILL_PRESSURE to enable this disabled-by-default workflow"
        required: true
        default: ""
        type: string
      limit:
        description: "Maximum active targets to backfill"
        required: false
        default: "1"
        type: string
      target_offset:
        description: "Number of active targets to skip before applying limit"
        required: false
        default: "0"
        type: string
      max_pages_per_app_country:
        description: "Required positive page count per app-country scope"
        required: false
        default: "25"
        type: string
      start_page:
        description: "Explicit first web catalog page to fetch"
        required: false
        default: "1"
        type: string
      review_limit:
        description: "Requested web catalog reviews per page; Apple currently caps this at 20"
        required: false
        default: "20"
        type: string
      request_delay_seconds:
        description: "Delay between web catalog requests"
        required: false
        default: "10"
        type: string
      request_delay_jitter_seconds:
        description: "Positive random jitter added to each normal request delay"
        required: false
        default: "5"
        type: string
      web_429_retries:
        description: "Retries after HTTP 429"
        required: false
        default: "1"
        type: string
      web_429_retry_seconds:
        description: "Base delay before retrying HTTP 429"
        required: false
        default: "300"
        type: string
      web_429_backoff_multiplier:
        description: "Multiplier applied to HTTP 429 retry delay on each additional retry"
        required: false
        default: "1.5"
        type: string
      web_429_retry_jitter_seconds:
        description: "Positive random jitter added to each HTTP 429 retry delay"
        required: false
        default: "60"
        type: string
      web_time_budget_seconds:
        description: "Overall wall-clock budget per app job; 0 means no overall budget"
        required: false
        default: "1200"
        type: string
      web_scope_time_budget_seconds:
        description: "Wall-clock budget per app-country scope; 0 means no per-scope budget"
        required: false
        default: "1200"
        type: string
      max_parallel:
        description: "Maximum app backfill jobs to run in parallel. True parallelism requires multiple self-hosted runner instances."
        required: false
        default: "1"
        type: string
      web_429_cooldown_minutes:
        description: "Optional pre-run fail-fast cooldown after recent HTTP 429; 0 disables pre-run cooldown"
        required: false
        default: "180"
        type: string
      web_429_circuit_breaker_min_pages:
        description: "Minimum current-run web catalog pages before the global HTTP 429 circuit breaker can trip"
        required: false
        default: "4"
        type: string
      web_429_circuit_breaker_max_rate:
        description: "Fail fast when current-run HTTP 429 page rate is at or above this value"
        required: false
        default: "0.5"
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: app-store-postgres-writer
  cancel-in-progress: false

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      max_parallel: ${{ steps.build-matrix.outputs.max_parallel }}
      run_started_at: ${{ steps.build-matrix.outputs.run_started_at }}
      selected_count: ${{ steps.build-matrix.outputs.selected_count }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build app backfill matrix
        id: build-matrix
        env:
          INPUT_CONFIRM_BACKFILL: ${{ inputs.confirm_backfill }}
          INPUT_LIMIT: ${{ inputs.limit || '1' }}
          INPUT_TARGET_OFFSET: ${{ inputs.target_offset || '0' }}
          INPUT_MAX_PARALLEL: ${{ inputs.max_parallel || '1' }}
          INPUT_MAX_PAGES_PER_APP_COUNTRY: ${{ inputs.max_pages_per_app_country || '25' }}
          INPUT_START_PAGE: ${{ inputs.start_page || '1' }}
          INPUT_REVIEW_LIMIT: ${{ inputs.review_limit || '20' }}
          INPUT_REQUEST_DELAY_SECONDS: ${{ inputs.request_delay_seconds || '10' }}
          INPUT_WEB_429_RETRIES: ${{ inputs.web_429_retries || '1' }}
          INPUT_WEB_429_RETRY_SECONDS: ${{ inputs.web_429_retry_seconds || '300' }}
          INPUT_WEB_TIME_BUDGET_SECONDS: ${{ inputs.web_time_budget_seconds || '1200' }}
          INPUT_WEB_SCOPE_TIME_BUDGET_SECONDS: ${{ inputs.web_scope_time_budget_seconds || '1200' }}
          INPUT_WEB_429_COOLDOWN_MINUTES: ${{ inputs.web_429_cooldown_minutes || '180' }}
        run: |
          set -euo pipefail
          if [ "$INPUT_CONFIRM_BACKFILL" != "I_UNDERSTAND_BACKFILL_PRESSURE" ]; then
            echo "Backfill confirmation phrase is missing or incorrect." >&2
            exit 2
          fi
          python3 - <<'PY'
          import os

          def integer(name, minimum, maximum):
              raw = os.environ[name]
              try:
                  value = int(raw)
              except ValueError as exc:
                  raise SystemExit(f"{name} must be an integer, got {raw!r}") from exc
              if not minimum <= value <= maximum:
                  raise SystemExit(f"{name} must be between {minimum} and {maximum}, got {value}")
              return value

          def number(name, minimum, maximum):
              raw = os.environ[name]
              try:
                  value = float(raw)
              except ValueError as exc:
                  raise SystemExit(f"{name} must be numeric, got {raw!r}") from exc
              if not minimum <= value <= maximum:
                  raise SystemExit(f"{name} must be between {minimum} and {maximum}, got {value}")
              return value

          integer("INPUT_LIMIT", 1, 5)
          integer("INPUT_MAX_PARALLEL", 1, 1)
          integer("INPUT_MAX_PAGES_PER_APP_COUNTRY", 1, 25)
          integer("INPUT_START_PAGE", 1, 1_000_000)
          integer("INPUT_REVIEW_LIMIT", 1, 20)
          integer("INPUT_WEB_429_RETRIES", 0, 2)
          integer("INPUT_WEB_429_COOLDOWN_MINUTES", 180, 1_440)
          number("INPUT_REQUEST_DELAY_SECONDS", 10, 300)
          number("INPUT_WEB_429_RETRY_SECONDS", 300, 1_800)
          number("INPUT_WEB_TIME_BUDGET_SECONDS", 1, 1_800)
          number("INPUT_WEB_SCOPE_TIME_BUDGET_SECONDS", 1, 1_800)
          PY
          echo "run_started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import csv
          import json
          import os

          limit = max(0, int(os.environ["INPUT_LIMIT"]))
          start_offset = max(0, int(os.environ["INPUT_TARGET_OFFSET"]))
          max_parallel = max(1, int(os.environ["INPUT_MAX_PARALLEL"]))
          rows = []
          with open("data/targets/apple_apps.csv", newline="", encoding="utf-8") as handle:
              active_index = 0
              for row in csv.DictReader(handle):
                  if str(row.get("active", "")).lower() != "true":
                      continue
                  if active_index >= start_offset:
                      rows.append(
                          {
                              "target_offset": active_index,
                              "app_id": row["apple_app_id"],
                              "app_name": row["app_name"],
                          }
                      )
                  active_index += 1
          if limit:
              rows = rows[:limit]
          matrix = {"include": rows}
          print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
          print(f"selected_count={len(rows)}")
          print(f"max_parallel={max_parallel}")
          PY

  backfill:
    needs: prepare-matrix
    if: ${{ fromJSON(needs.prepare-matrix.outputs.selected_count) > 0 }}
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.prepare-matrix.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    env:
      PIP_CONFIG_FILE: /dev/null
      PIP_USER: "false"
      INPUT_LIMIT: "1"
      INPUT_TARGET_OFFSET: ${{ matrix.target_offset }}
      MATRIX_APP_ID: ${{ matrix.app_id }}
      INPUT_MAX_PAGES_PER_APP_COUNTRY: ${{ inputs.max_pages_per_app_country || '25' }}
      INPUT_START_PAGE: ${{ inputs.start_page || '1' }}
      INPUT_REVIEW_LIMIT: ${{ inputs.review_limit || '20' }}
      INPUT_REQUEST_DELAY_SECONDS: ${{ inputs.request_delay_seconds || '10' }}
      INPUT_REQUEST_DELAY_JITTER_SECONDS: ${{ inputs.request_delay_jitter_seconds || '5' }}
      INPUT_WEB_429_RETRIES: ${{ inputs.web_429_retries || '1' }}
      INPUT_WEB_429_RETRY_SECONDS: ${{ inputs.web_429_retry_seconds || '300' }}
      INPUT_WEB_429_BACKOFF_MULTIPLIER: ${{ inputs.web_429_backoff_multiplier || '1.5' }}
      INPUT_WEB_429_RETRY_JITTER_SECONDS: ${{ inputs.web_429_retry_jitter_seconds || '60' }}
      INPUT_WEB_TIME_BUDGET_SECONDS: ${{ inputs.web_time_budget_seconds || '1200' }}
      INPUT_WEB_SCOPE_TIME_BUDGET_SECONDS: ${{ inputs.web_scope_time_budget_seconds || '1200' }}
      INPUT_WEB_429_COOLDOWN_MINUTES: ${{ inputs.web_429_cooldown_minutes || '180' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_MIN_PAGES: ${{ inputs.web_429_circuit_breaker_min_pages || '4' }}
      INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE: ${{ inputs.web_429_circuit_breaker_max_rate || '0.5' }}
      BACKFILL_RUN_STARTED_AT: ${{ needs.prepare-matrix.outputs.run_started_at }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create Python virtualenv
        run: |
          set -euo pipefail
          python3.12 -m venv .venv

      - name: Install dependencies
        run: .venv/bin/python -m pip install -r requirements.lock

      - name: Check local Postgres
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py init-postgres --database-url "$database_url"

      - name: Check web catalog 429 cooldown
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py check-web-429-cooldown \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --cooldown-minutes "$INPUT_WEB_429_COOLDOWN_MINUTES"

      - name: Check global web catalog 429 circuit breaker
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          .venv/bin/python app_store_pipeline.py check-web-429-circuit-breaker \
            --database-url "$database_url" \
            --source apple_app_store_web_catalog_reviews \
            --since "$BACKFILL_RUN_STARTED_AT" \
            --min-pages "$INPUT_WEB_429_CIRCUIT_BREAKER_MIN_PAGES" \
            --max-rate "$INPUT_WEB_429_CIRCUIT_BREAKER_MAX_RATE"

      - name: Run capped web catalog backfill diagnostic
        env:
          DATABASE_URL: ${{ secrets.APP_STORE_DATABASE_URL }}
        run: |
          set -euo pipefail
          database_url="${DATABASE_URL:-postgresql:///app_store_reviews}"
          echo "Backfilling target offset $INPUT_TARGET_OFFSET: ${{ matrix.app_name }} (${{ matrix.app_id }})"
          if [[ ! "$MATRIX_APP_ID" =~ ^[0-9]+$ ]]; then
            echo "Invalid matrix app id: $MATRIX_APP_ID" >&2
            exit 1
          fi
          if [[ ! "$INPUT_REVIEW_LIMIT" =~ ^[0-9]+$ ]]; then
            echo "Invalid review limit: $INPUT_REVIEW_LIMIT" >&2
            exit 1
          fi
          start_page="$INPUT_START_PAGE"
          if [[ ! "$start_page" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid explicit start page: $start_page" >&2
            exit 1
          fi
          echo "Using start page: $start_page"

          .venv/bin/python app_store_pipeline.py daily-web-catalog \
            --database-url "$database_url" \
            --limit "$INPUT_LIMIT" \
            --target-offset "$INPUT_TARGET_OFFSET" \
            --max-pages-per-app-country "$INPUT_MAX_PAGES_PER_APP_COUNTRY" \
            --start-page "$start_page" \
            --review-limit "$INPUT_REVIEW_LIMIT" \
            --request-delay-seconds "$INPUT_REQUEST_DELAY_SECONDS" \
            --request-delay-jitter-seconds "$INPUT_REQUEST_DELAY_JITTER_SECONDS" \
            --web-429-retries "$INPUT_WEB_429_RETRIES" \
            --web-429-retry-seconds "$INPUT_WEB_429_RETRY_SECONDS" \
            --web-429-backoff-multiplier "$INPUT_WEB_429_BACKOFF_MULTIPLIER" \
            --web-429-retry-jitter-seconds "$INPUT_WEB_429_RETRY_JITTER_SECONDS" \
            --web-time-budget-seconds "$INPUT_WEB_TIME_BUDGET_SECONDS" \
            --web-scope-time-budget-seconds "$INPUT_WEB_SCOPE_TIME_BUDGET_SECONDS" \
            --disable-overlap-stop

      - name: Upload web catalog backfill artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: app-store-web-catalog-backfill-${{ github.run_id }}-${{ matrix.target_offset }}-${{ matrix.app_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            data/raw/apple_web_catalog/
            data/reports/apple_web_catalog/
